name: CI Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      # Use pgvector container to support vector operations natively in tests
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: stripe_docs_rag
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
        
    - name: Lint with Ruff
      run: |
        ruff check .
        
    - name: Run Pytest (Unit & Integration)
      env:
        # Provide the service container's DB URL so tests run against real Postgres
        SUPABASE_DB_URL: postgresql+psycopg://postgres:testpassword@localhost:5432/stripe_docs_rag
      run: |
        python -m pytest tests/ -v
